<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>账号解封服务 - 8000VIP服务</title>
  <style>
    * {
      margin:0;
      padding:0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background-color: #F0EAE4;
      min-height: 100dvh;
      color: #333;
      overscroll-behavior: none;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ===== 步骤指示器 ===== */
    .step-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 16px 4px;
      font-size: 13px;
      color: #B0A898;
    }
    .step-bar .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
    }
    .step-bar .step-num.active {
      background: #D4A84C;
      color: #fff;
    }
    .step-bar .step-num.inactive {
      background: #E0D8CC;
      color: #B0A898;
    }
    .step-bar .step-text { font-weight: 600; }
    .step-bar .step-text.active { color: #5A453E; }
    .step-bar .step-arrow { color: #D0C8B8; font-size: 12px; }

    /* ===== 白卡片容器 ===== */
    .section-card {
      background: #fff;
      border-radius: 18px;
      padding: 22px 18px 18px;
      margin: 10px 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    /* ===== 产品选择 ===== */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FAF8F5;
      border: 2px solid #E8E2DA;
      border-radius: 14px;
      padding: 22px 12px 18px;
      cursor: pointer;
      transition: all 0.22s ease;
      -webkit-touch-callout: none;
      user-select: none;
      text-align: center;
    }
    .product-card:active { transform: scale(0.97); }
    .product-card.selected {
      border-color: #D4A84C;
      background: #FFFDF5;
      box-shadow: 0 2px 12px rgba(212,168,76,0.15);
    }
    .product-icon {
      font-size: 32px;
      margin-bottom: 10px;
      line-height: 1;
    }
    .product-name {
      font-size: 15px;
      font-weight: 700;
      color: #3A3530;
      line-height: 1.4;
    }
    .product-desc {
      font-size: 12px;
      color: #A09888;
      margin-top: 4px;
      line-height: 1.4;
    }

    /* ===== 网格卡片（共用） ===== */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .item-card {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FAF8F5;
      border: 2px solid #E8E2DA;
      border-radius: 13px;
      padding: 14px 6px;
      cursor: pointer;
      transition: all 0.22s ease;
      -webkit-touch-callout: none;
      user-select: none;
      text-align: center;
      min-height: 56px;
      overflow: hidden;
    }
    .item-card:active { transform: scale(0.96); }
    .item-card.selected {
      border-color: #D4A84C;
      background: #FFFDF5;
      box-shadow: 0 2px 12px rgba(212,168,76,0.15);
    }
    .item-card .card-text {
      font-size: 13px;
      font-weight: 700;
      color: #3A3530;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-card.selected .card-text {
      color: #D4A84C;
    }
    .item-card.dashed {
      border-style: dashed;
      border-color: #D8D0C4;
    }
    .item-card.dashed .card-text {
      color: #A09888;
      font-weight: 500;
    }

    /* ===== 提示条 ===== */
    .hint-bar {
      text-align: center;
      padding: 8px 16px;
      font-size: 13px;
      color: #A09080;
    }
    .hint-bar span { color: #D4A84C; font-weight: 600; }

    /* ===== 表单卡片 ===== */
    .form-section {
      padding: 4px 14px 20px;
    }

    .form-card {
      background: #fff;
      border-radius: 18px;
      padding: 28px 22px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .form-card h2 {
      font-size: 19px;
      font-weight: 700;
      color: #3A3530;
      margin-bottom: 4px;
      text-align: center;
    }

    .form-card-subtitle {
      text-align: center;
      font-size: 13px;
      color: #B0A898;
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #5A544E;
      margin-bottom: 8px;
    }
    .form-group label .required { color: #D4544C; margin-left: 2px; }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #E5DED6;
      border-radius: 10px;
      font-size: 15px;
      color: #333;
      outline: none;
      background: #FAF8F5;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      -webkit-appearance: none;
    }
    .form-input:focus {
      border-color: #D4A84C;
      box-shadow: 0 0 0 3px rgba(212,168,76,0.1);
    }
    .form-input::placeholder { color: #C0B8A8; }

    textarea.form-input {
      min-height: 90px;
      resize: vertical;
      line-height: 1.6;
    }

    /* ===== 提交按钮 ===== */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: #3A3D4A;
      color: #D4A84C;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 6px;
      cursor: pointer;
      transition: all 0.25s ease;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .submit-btn:active { transform: translateY(1px); background: #2D303B; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(45,48,59,0.92);
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      text-align: center;
      max-width: 80%;
      line-height: 1.5;
    }
    .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    .safe-bottom { height: env(safe-area-inset-bottom); }

    /* 隐藏区域 */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- 步骤指示器 -->
  <div class="step-bar">
    <span class="step-num active" id="step1Num">1</span>
    <span class="step-text active" id="step1Text">选择产品</span>
    <span class="step-arrow">›</span>
    <span class="step-num inactive" id="step2Num">2</span>
    <span class="step-text" id="step2Text">选择问题</span>
  </div>

  <!-- 第一步：选择产品 -->
  <div class="section-card" id="step1Card">
    <div class="product-grid">
      <div class="product-card" data-type="company">
        <div class="product-icon">🏢</div>
        <div class="product-name">司内产品账号</div>
        <div class="product-desc">微信、QQ 等</div>
      </div>
      <div class="product-card" data-type="game">
        <div class="product-icon">🎮</div>
        <div class="product-name">游戏账号</div>
        <div class="product-desc">无畏契约、穿越火线等</div>
      </div>
    </div>
  </div>

  <!-- 第二步：选择问题（初始隐藏） -->
  <div class="section-card hidden" id="step2Card">
    <!-- 司内产品问题 -->
    <div class="hidden" id="companyQuestions">
      <div class="item-grid">
        <div class="item-card" data-question="账号被封禁，无法正常登录">
          <span class="card-text">账号封禁登录</span>
        </div>
        <div class="item-card" data-question="账号部分功能被限制使用">
          <span class="card-text">功能限制使用</span>
        </div>
        <div class="item-card" data-question="忘记了登录密码">
          <span class="card-text">忘记登录密码</span>
        </div>
      </div>
    </div>

    <!-- 游戏账号问题 -->
    <div class="hidden" id="gameQuestions">
      <div class="item-grid">
        <div class="item-card" data-question="游戏账号被封禁">
          <span class="card-text">账号封禁</span>
        </div>
        <div class="item-card" data-question="游戏账号被盗">
          <span class="card-text">账号被盗</span>
        </div>
        <div class="item-card" data-question="忘记了游戏登录密码">
          <span class="card-text">忘记密码</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 提示 -->
  <div class="hint-bar" id="hintBar">点击上方卡片可<span>自动填入</span>表单，具体账号信息请单聊提供给专员</div>

  <!-- 表单区 -->
  <div class="form-section">
    <div class="form-card">
      <h2>提交需求</h2>
      <div class="form-card-subtitle">专员将在收到后尽快联系您</div>
      <form id="applyForm">

        <div class="form-group">
          <label>您的企业微信英文名<span class="required">*</span></label>
          <input type="text" class="form-input" id="weworkName" placeholder="例：patfootliu" autocomplete="off">
        </div>

        <div class="form-group">
          <label>请描述您的需求或遇到的问题<span class="required">*</span></label>
          <textarea class="form-input" id="description" placeholder="例如：微信账号提示异常登录被封，需要协助解封..."></textarea>
        </div>

        <button type="submit" class="submit-btn">提 交</button>
      </form>
    </div>
  </div>

  <div class="safe-bottom"></div>

  <div class="toast" id="toast"></div>

  <script>
    const SCF_FUNCTION_URL = 'https://1257899736-jbihimkpfb.ap-guangzhou.tencentcf.com';
    const WEBHOOK_KEY = '257abe2d-532e-4a31-a456-1f1c7bce544d';

    let selectedProduct = null;   // 'company' | 'game'
    let selectedQuestion = null;
    let selectedGame = null;

    // ===== 第一步：产品选择 =====
    document.querySelectorAll('.product-card').forEach(card => {
      card.addEventListener('click', () => {
        // 选中状态
        document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');

        selectedProduct = card.dataset.type;

        // 显示第二步
        document.getElementById('step2Card').classList.remove('hidden');

        // 显示对应问题
        document.getElementById('companyQuestions').classList.add('hidden');
        document.getElementById('gameQuestions').classList.add('hidden');
        if (selectedProduct === 'company') {
          document.getElementById('companyQuestions').classList.remove('hidden');
        } else {
          document.getElementById('gameQuestions').classList.remove('hidden');
        }

        // 更新步骤指示器
        document.getElementById('step1Num').classList.remove('active');
        document.getElementById('step1Num').classList.add('inactive');
        document.getElementById('step1Text').classList.remove('active');
        document.getElementById('step2Num').classList.remove('inactive');
        document.getElementById('step2Num').classList.add('active');
        document.getElementById('step2Text').classList.add('active');

        // 显示提示
        document.getElementById('hintBar').classList.remove('hidden');

        // 滚动到第二步
        setTimeout(() => {
          document.getElementById('step2Card').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      });
    });

    // ===== 第二步：问题卡片点击（司内产品）=====
    document.querySelectorAll('#companyQuestions .item-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('#companyQuestions .item-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        const q = card.dataset.question;
        if (q) {
          selectedQuestion = q;
          const cleanText = q.replace(/[？?。]+$/, '');
          document.getElementById('description').value = cleanText + '\n\n';
        }
        scrollToForm();
      });
    });

    // ===== 第二步：问题/游戏卡片点击（游戏）=====
    document.querySelectorAll('#gameQuestions .item-card').forEach(card => {
      card.addEventListener('click', () => {
        if (card.classList.contains('dashed')) return;

        const hasGame = card.dataset.game;
        const hasQuestion = card.dataset.question;

        if (hasQuestion) {
          // 问题卡片
          document.querySelectorAll('#gameQuestions .item-card').forEach(c => {
            if (!c.classList.contains('dashed')) c.classList.remove('selected');
          });
          card.classList.add('selected');
          selectedQuestion = hasQuestion;
          const cleanText = hasQuestion.replace(/[？?。]+$/, '');
          document.getElementById('description').value = cleanText + '\n\n';
          scrollToForm();
        } else if (hasGame) {
          // 游戏卡片（可多选）
          const wasSelected = card.classList.contains('selected');
          if (!wasSelected) {
            card.classList.add('selected');
            selectedGame = hasGame;
          } else {
            card.classList.remove('selected');
            selectedGame = null;
          }
          // 更新描述框
          scrollToForm();
        }
      });
    });

    function scrollToForm() {
      setTimeout(() => {
        document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
        document.getElementById('description').focus();
      }, 200);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ===== 表单提交 =====
    document.getElementById('applyForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('weworkName').value.trim();
      const desc = document.getElementById('description').value.trim();

      if (!name) { showToast('请输入您的企业微信英文名'); return; }
      if (!desc) { showToast('请描述您的需求'); return; }

      const btn = e.target.querySelector('.submit-btn');
      btn.disabled = true;
      btn.textContent = '提交中...';

      try {
        const timeStr = new Date().toLocaleString('zh-CN');
        const productLine = selectedProduct === 'company' ? '\n> **产品类型：**司内产品' : '\n> **产品类型：**游戏产品';
        const qLine = selectedQuestion ? '\n> **选中问题：**' + selectedQuestion.replace(/[？?。]+$/, '') : '';

        let games = [];
        document.querySelectorAll('#gameQuestions .item-card.selected').forEach(c => {
          if (c.dataset.game) games.push(c.dataset.game);
        });
        const gLine = games.length > 0 ? '\n> **涉及游戏：**' + games.join('、') : '';

        const message = {
          msgtype: 'markdown',
          markdown: {
            content:
              '**🔓 账号解封新需求**\n\n' +
              '> **称呼：**' + name +
              productLine +
              qLine +
              gLine +
              '\n> **详细描述：**\n' + desc + '\n' +
              '> **时间：**' + timeStr + '\n\n---\n' +
              '<font color="info">8000VIP 账号解封服务</font>'
          }
        };

        const resp = await fetch(SCF_FUNCTION_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Webhook-Key': WEBHOOK_KEY },
          body: JSON.stringify(message)
        });

        if (resp.ok) {
          showToast('✅ 提交成功！专员会尽快联系您');
          document.getElementById('applyForm').reset();
          selectedProduct = null;
          selectedQuestion = null;
          selectedGame = null;
          document.querySelectorAll('.item-card, .product-card').forEach(c => c.classList.remove('selected'));
          // 回到第一步
          document.getElementById('step2Card').classList.add('hidden');
          document.getElementById('hintBar').classList.add('hidden');
          document.getElementById('step1Num').classList.remove('inactive');
          document.getElementById('step1Num').classList.add('active');
          document.getElementById('step1Text').classList.add('active');
          document.getElementById('step2Num').classList.remove('active');
          document.getElementById('step2Num').classList.add('inactive');
          document.getElementById('step2Text').classList.remove('active');
        } else {
          throw new Error('HTTP ' + resp.status);
        }
      } catch (err) {
        console.error(err);
        showToast('❌ 提交失败，请稍后重试');
      } finally {
        btn.disabled = false;
        btn.textContent = '提 交';
      }
    });
  </script>

</body>
</html>
